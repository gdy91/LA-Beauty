<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA Beauty Center | مركز تجميل LA</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running React in the browser -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Icons Component Wrapper for CDN usage
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, fill: fill === "none" ? "none" : fill }}></i>;
        };

        function App() {
            const [selectedService, setSelectedService] = useState('قص وتصفيف الشعر');
            const [booked, setBooked] = useState(false);

            const services = [
                { id: '1', name: 'قص وتصفيف الشعر', price: '25 JD', icon: 'scissors' },
                { id: '2', name: 'تنظيف بشرة', price: '40 JD', icon: 'sparkles' },
                { id: '3', name: 'مكياج سهرة', price: '50 JD', icon: 'user' },
                { id: '4', name: 'أظافر', price: '20 JD', icon: 'wind' },
            ];

            const handleBooking = (e) => {
                e.preventDefault();
                setBooked(true);
                setTimeout(() => setBooked(false), 3000);
            };

            return (
                <div className="flex flex-col min-h-screen bg-white max-w-md mx-auto shadow-2xl relative">
                    {/* Header */}
                    <header className="px-6 py-6 flex justify-between items-center bg-white sticky top-0 z-40 border-b border-stone-50">
                        <div>
                            <p className="text-gray-400 text-xs mb-1">أهلاً بكِ في</p>
                            <h1 className="text-3xl font-black text-rose-900 tracking-tighter">LA BEAUTY ✨</h1>
                        </div>
                        <button className="p-3 bg-rose-50 rounded-2xl text-rose-600">
                            <Icon name="heart" fill="#e11d48" />
                        </button>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-24">
                        {/* Hero Banner */}
                        <div className="px-6 py-4">
                            <div className="relative h-48 rounded-[2.5rem] overflow-hidden group shadow-xl shadow-rose-100">
                                <img 
                                    src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=500" 
                                    className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-rose-950/90 via-rose-900/20 to-transparent p-6 flex flex-col justify-end">
                                    <span className="bg-rose-500 text-white text-[10px] font-bold px-3 py-1 rounded-full w-fit mb-2">عرض خاص</span>
                                    <h2 className="text-white text-2xl font-bold italic">دلال ملكي</h2>
                                    <p className="text-rose-100 text-sm">احصلي على خصم 20% عند أول زيارة</p>
                                </div>
                            </div>
                        </div>

                        {/* Services Grid */}
                        <section className="px-6 py-4">
                            <h3 className="text-xl font-black text-gray-800 mb-6 flex items-center gap-2">
                                <span className="w-2 h-8 bg-rose-600 rounded-full"></span>
                                اختاري خدمتكِ
                            </h3>
                            <div className="grid grid-cols-2 gap-4">
                                {services.map(service => (
                                    <button 
                                        key={service.id}
                                        onClick={() => setSelectedService(service.name)}
                                        className={`p-6 rounded-[2rem] flex flex-col items-center justify-center transition-all border-2 ${
                                            selectedService === service.name 
                                            ? 'bg-rose-600 border-rose-600 shadow-lg shadow-rose-200 -translate-y-1' 
                                            : 'bg-stone-50 border-stone-100 hover:border-rose-200'
                                        }`}
                                    >
                                        <div className={`p-4 rounded-2xl mb-4 ${selectedService === service.name ? 'bg-white/20 text-white' : 'bg-white text-rose-600 shadow-sm'}`}>
                                            <Icon name={service.icon} size={28} />
                                        </div>
                                        <span className={`text-sm font-bold text-center ${selectedService === service.name ? 'text-white' : 'text-gray-800'}`}>
                                            {service.name}
                                        </span>
                                        <span className={`text-xs mt-1 ${selectedService === service.name ? 'text-rose-100 font-bold' : 'text-rose-500'}`}>
                                            {service.price}
                                        </span>
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* Quick Booking */}
                        <section className="px-6 py-6">
                            <div className="bg-stone-900 rounded-[3rem] p-8 text-white relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-rose-600/20 blur-3xl rounded-full -mr-16 -mt-16"></div>
                                <h3 className="text-xl font-bold mb-6 text-center">حجز موعد سريع ✨</h3>
                                
                                <form onSubmit={handleBooking} className="space-y-4">
                                    <div className="bg-white/10 rounded-2xl p-4 flex items-center gap-4 border border-white/10">
                                        <Icon name="calendar" size={18} className="text-rose-400" />
                                        <input type="text" placeholder="اليوم المفضل" className="bg-transparent outline-none w-full text-sm text-right placeholder:text-gray-500" />
                                    </div>
                                    <div className="bg-white/10 rounded-2xl p-4 flex items-center gap-4 border border-white/10">
                                        <Icon name="phone" size={18} className="text-rose-400" />
                                        <input type="tel" placeholder="رقم الموبايل" className="bg-transparent outline-none w-full text-sm text-right placeholder:text-gray-500" />
                                    </div>
                                    <button className="w-full bg-rose-600 py-4 rounded-2xl font-black shadow-xl shadow-rose-950/50 hover:bg-rose-500 transition-colors flex items-center justify-center gap-2">
                                        تأكيد الحجز الآن
                                        <Icon name="chevron-right" size={18} />
                                    </button>
                                </form>
                            </div>
                        </section>
                    </main>

                    {/* Bottom Nav */}
                    <nav className="absolute bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-xl border-t border-stone-100 flex justify-around items-center px-10 rounded-t-[2.5rem] shadow-2xl">
                        <button className="text-rose-600 scale-125"><Icon name="home" fill="#e11d48" /></button>
                        <button className="text-gray-300"><Icon name="calendar" /></button>
                        <button className="text-gray-300"><Icon name="phone" /></button>
                        <button className="text-gray-300"><Icon name="user" /></button>
                    </nav>

                    {/* Notification */}
                    {booked && (
                        <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-black text-white px-8 py-4 rounded-full shadow-2xl animate-bounce border border-rose-500 flex items-center gap-3">
                            <Icon name="check-circle" className="text-green-400" />
                            <span className="font-bold text-sm italic">تم استلام طلبك يا جميلة! ✨</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
